<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Order Management | Wonderfull Cafe</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 100px auto 50px;
            padding: 20px;
        }

        .admin-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .admin-header h1 {
            font-size: 40px;
            color: #fff;
            margin-bottom: 10px;
        }

        .admin-header p {
            color: #888;
        }

        .orders-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: #333;
            border: 1px solid #444;
            border-radius: 12px;
            padding: 25px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 36px;
            color: #ff5a3c;
            margin-bottom: 10px;
        }

        .stat-card p {
            color: #888;
        }

        .filter-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filter-tab {
            padding: 10px 25px;
            border: 2px solid #444;
            background: #333;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: 0.3s;
            color: #fff;
        }

        .filter-tab:hover,
        .filter-tab.active {
            background: #ff5a3c;
            border-color: #ff5a3c;
            color: #fff;
        }

        .orders-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .order-card {
            background: #333;
            border: 1px solid #444;
            border-radius: 12px;
            padding: 25px;
            transition: 0.3s;
        }

        .order-card.completed {
            opacity: 0.6;
            border-left: 4px solid #28a745;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #444;
        }

        .order-id {
            font-size: 18px;
            font-weight: 600;
            color: #ff5a3c;
        }

        .order-time {
            color: #888;
            font-size: 14px;
        }

        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-pending {
            background: #ffc107;
            color: #000;
        }

        .status-completed {
            background: #28a745;
            color: #fff;
        }

        .order-items {
            list-style: none;
        }

        .order-items li {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #444;
            color: #888;
        }

        .order-items li:last-child {
            border-bottom: none;
        }

        .order-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #444;
            font-size: 20px;
            font-weight: 600;
            color: #fff;
        }

        .order-total span:last-child {
            color: #ff5a3c;
            font-size: 24px;
        }

        .order-actions {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #444;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .mark-done-btn {
            padding: 10px 20px;
            background: #28a745;
            color: #fff;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: 0.3s;
        }

        .mark-done-btn:hover {
            background: #218838;
        }

        .mark-done-btn:disabled {
            background: #6c757d;
            cursor: not-allowed;
        }

        .delete-btn {
            padding: 10px 20px;
            background: #dc3545;
            color: #fff;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: 0.3s;
        }

        .delete-btn:hover {
            background: #c82333;
        }

        .no-orders {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }

        .no-orders i {
            font-size: 60px;
            margin-bottom: 20px;
            color: #444;
        }

        .refresh-btn {
            display: block;
            margin: 20px auto;
            padding: 12px 30px;
            background: #ff5a3c;
            color: #fff;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: 0.3s;
        }

        .refresh-btn:hover {
            background: #e04428;
        }

        .server-status {
            text-align: center;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        .server-status.connected {
            background: #28a745;
            color: #fff;
        }

        .server-status.disconnected {
            background: #dc3545;
            color: #fff;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="nav-logo">
            <i class="fas fa-utensils"></i>
            <span>Wonderfull Cafe</span>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="admin.html" class="active">Admin</a></li>
        </ul>
    </nav>

    <div class="admin-container">
        <div class="admin-header">
            <h1>Order Management</h1>
            <p>View and manage customer orders</p>
        </div>

        <div class="server-status disconnected" id="serverStatus">
            <i class="fas fa-exclamation-circle"></i> Server not connected. Make sure server is running.
        </div>

        <div class="orders-stats">
            <div class="stat-card">
                <h3 id="totalOrders">0</h3>
                <p>Total Orders</p>
            </div>
            <div class="stat-card">
                <h3 id="totalAmount">$0</h3>
                <p>Total Revenue</p>
            </div>
            <div class="stat-card">
                <h3 id="pendingOrders">0</h3>
                <p>Pending Orders</p>
            </div>
        </div>

        <div class="filter-tabs">
            <button class="filter-tab active" data-filter="all">All Orders</button>
            <button class="filter-tab" data-filter="pending">Pending</button>
            <button class="filter-tab" data-filter="completed">Completed</button>
        </div>

        <button class="refresh-btn" onclick="loadOrders()">
            <i class="fas fa-sync-alt"></i> Refresh Orders
        </button>

        <div class="orders-list" id="ordersList">
            <div class="no-orders">
                <i class="fas fa-clipboard-list"></i>
                <p>No orders yet</p>
            </div>
        </div>
    </div>

    <script>
        let currentFilter = 'all';
        let allOrders = [];

        function getServerUrl() {
            return window.location.protocol + '//' + window.location.hostname + ':5000';
        }

        async function loadOrders() {
            const serverStatus = document.getElementById('serverStatus');
            const serverUrl = getServerUrl();

            try {
                const response = await fetch(serverUrl + '/orders');

                if (!response.ok) {
                    throw new Error('Server not responding');
                }

                allOrders = await response.json();
                serverStatus.className = 'server-status connected';
                serverStatus.innerHTML = '<i class="fas fa-check-circle"></i> Connected to server at ' + window.location.hostname;

                const ordersList = document.getElementById('ordersList');
                const totalOrdersEl = document.getElementById('totalOrders');
                const totalRevenueEl = document.getElementById('totalAmount');
                const pendingOrdersEl = document.getElementById('pendingOrders');

                let displayOrders = [...allOrders];

                if (currentFilter === 'pending') {
                    displayOrders = displayOrders.filter(o => !o.completed);
                } else if (currentFilter === 'completed') {
                    displayOrders = displayOrders.filter(o => o.completed);
                }

                if (displayOrders.length === 0) {
                    ordersList.innerHTML = '<div class="no-orders"><i class="fas fa-clipboard-list"></i><p>No orders found</p></div>';
                    totalOrdersEl.textContent = '0';
                    totalRevenueEl.textContent = '$0';
                    pendingOrdersEl.textContent = '0';
                    return;
                }

                let totalRevenue = 0;
                let pendingCount = 0;

                allOrders.forEach(order => {
                    if (order.total) totalRevenue += order.total;
                    if (!order.completed) pendingCount++;
                });

                totalOrdersEl.textContent = allOrders.length;
                totalRevenueEl.textContent = '$' + totalRevenue;
                pendingOrdersEl.textContent = pendingCount;

                displayOrders = displayOrders.reverse();

                ordersList.innerHTML = displayOrders.map((order) => {
                    const actualIndex = allOrders.findIndex(o => o.id === order.id);

                    const orderTotal = order.total || 0;
                    const isCompleted = order.completed === true;
                    const orderNumber = allOrders.length - actualIndex;
                    const orderDate = new Date(order.createdAt || Date.now());
                    const timeString = orderDate.toLocaleString();

                    const statusBadge = isCompleted
                        ? '<span class="status-badge status-completed">Completed</span>'
                        : '<span class="status-badge status-pending">Pending</span>';

                    const itemsHtml = order.items ? order.items.map(item => `
                        <li>
                            <div><span>${item.name}</span></div>
                            <span>$${item.price}</span>
                        </li>
                    `).join('') : '';

                    const cardClass = isCompleted ? 'order-card completed' : 'order-card';
                    const doneButton = isCompleted
                        ? '<button class="mark-done-btn" disabled><i class="fas fa-check"></i> Done</button>'
                        : `<button class="mark-done-btn" onclick="handleMarkDone(${actualIndex})"><i class="fas fa-check"></i> Mark as Done</button>`;

                    return `<div class="${cardClass}">
                        <div class="order-header">
                            <span class="order-id">Order #${orderNumber}</span>
                            <div>${statusBadge} <span class="order-time">${timeString}</span></div>
                        </div>
                        ${order.tableNumber ? `<div class="order-table" style="color: #ff5a3c; font-weight: 600; margin-bottom: 10px;"><i class="fas fa-chair"></i> Table ${order.tableNumber}</div>` : ''}
                        <ul class="order-items">${itemsHtml}</ul>
                        <div class="order-total"><span>Total</span><span>$${orderTotal}</span></div>
                        <div class="order-actions">${doneButton} <button class="delete-btn" onclick="handleDelete(${actualIndex})"><i class="fas fa-trash"></i> Delete</button></div>
                    </div>`;
                }).join('');

            } catch (error) {
                console.error('Error loading orders:', error);
                serverStatus.className = 'server-status disconnected';
                serverStatus.innerHTML = '<i class="fas fa-exclamation-circle"></i> Server not connected. Make sure server is running on port 5000.<br><small>Current host: ' + window.location.hostname + '</small>';
                document.getElementById('ordersList').innerHTML = '<div class="no-orders"><i class="fas fa-exclamation-triangle"></i><p>Error loading orders.</p></div>';
            }
        }

        async function handleMarkDone(orderIndex) {
            console.log('Marking order as done, index:', orderIndex);

            try {
                const serverUrl = getServerUrl();
                const response = await fetch(serverUrl + '/orders/' + orderIndex, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ completed: true })
                });

                if (response.ok) {
                    alert('Order marked as done!');
                    loadOrders();
                } else {
                    alert('Error updating order. Please try again.');
                }
            } catch (error) {
                console.error('Error marking order:', error);
                alert('Error updating order. Make sure server is running.');
            }
        }

        async function handleDelete(orderIndex) {
            console.log('Deleting order, index:', orderIndex);

            if (!confirm('Are you sure you want to delete this order?')) return;

            try {
                const serverUrl = getServerUrl();
                const response = await fetch(serverUrl + '/orders/' + orderIndex, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    alert('Order deleted!');
                    loadOrders();
                } else {
                    alert('Error deleting order. Please try again.');
                }
            } catch (error) {
                console.error('Error deleting order:', error);
                alert('Error deleting order. Make sure server is running.');
            }
        }

        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.addEventListener('click', function () {
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.getAttribute('data-filter');
                loadOrders();
            });
        });

        loadOrders();
        setInterval(loadOrders, 10000);
    </script>
</body>

</html>
