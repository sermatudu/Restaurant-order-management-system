<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tacos - Wonderfull Cafe</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500&family=Sanchez:wght@400;500;600&display=swap"
        rel="stylesheet">
</head>

<body>

    <nav class="detail-nav">
        <a href="index.html" class="back-btn">← Back to Menu</a>
    </nav>

    <section class="detail-section">
        <div class="detail-container">
            <div class="detail-image">
                <img src="images/maxican tacos.png" alt="Tacos">
            </div>
            <div class="detail-info">
                <h1>Street Tacos</h1>
                <p class="detail-description">
                    Authentic Mexican street tacos with seasoned beef, fresh cilantro, onions, and zesty lime on corn
                    tortillas.
                </p>
                <div class="detail-price">
                    <span class="price">$9</span>
                </div>
                <div class="detail-options">
                    <h3>Customize Your Tacos</h3>
                    <label>
                        <input type="checkbox" id="extraGuac" onchange="updatePrice()">
                        Extra Guacamole (+$2)
                    </label>
                    <label>
                        <input type="checkbox" id="sourCream" onchange="updatePrice()">
                        Add Sour Cream (+$1)
                    </label>
                </div>
                <div class="quantity-selector">
                    <button onclick="decreaseQty()">-</button>
                    <span id="quantity">1</span>
                    <button onclick="increaseQty()">+</button>
                </div>
                <div class="total-price">
                    Total: $<span id="totalPrice">9</span>
                </div>
                <button class="btn add-to-order" onclick="addTacosToOrder()">Add to Order</button>
            </div>
        </div>
    </section>

    <footer>
        <p>© 2026 Wonderfull Cafe | All Rights Reserved</p>
    </footer>

    <script src="script.js"></script>
    <script>
        let basePrice = 9;
        let quantity = 1;

        function updatePrice() {
            let total = basePrice;
            if (document.getElementById('extraGuac').checked) total += 2;
            if (document.getElementById('sourCream').checked) total += 1;
            document.getElementById('totalPrice').textContent = total * quantity;
        }

        function increaseQty() {
            quantity++;
            document.getElementById('quantity').textContent = quantity;
            updatePrice();
        }

        function decreaseQty() {
            if (quantity > 1) {
                quantity--;
                document.getElementById('quantity').textContent = quantity;
                updatePrice();
            }
        }

        function addTacosToOrder() {
            let total = basePrice;
            let itemName = 'Street Tacos';
            let customizations = [];

            if (document.getElementById('extraGuac').checked) {
                total += 2;
                customizations.push('Extra Guacamole');
            }
            if (document.getElementById('sourCream').checked) {
                total += 1;
                customizations.push('Sour Cream');
            }

            if (customizations.length > 0) {
                itemName = 'Street Tacos (' + customizations.join(', ') + ')';
            }

            for (let i = 0; i < quantity; i++) {
                addToOrder(itemName, total);
            }

            alert('Tacos added to order!');
        }
    </script>
</body>

</html>
