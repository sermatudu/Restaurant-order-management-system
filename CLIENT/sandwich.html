<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandwich - Wonderfull Cafe</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500&family=Sanchez:wght@400;500;600&display=swap"
        rel="stylesheet">
</head>

<body>

    <nav class="detail-nav">
        <a href="index.html" class="back-btn">← Back to Menu</a>
    </nav>

    <section class="detail-section">
        <div class="detail-container">
            <div class="detail-image">
                <img src="images/grilled sandwitch.png" alt="Sandwich">
            </div>
            <div class="detail-info">
                <h1>Classic Sandwich</h1>
                <p class="detail-description">
                    Our delicious sandwich is made with freshly baked bread, premium roasted turkey, crisp lettuce,
                    tomato, and our signature mayo sauce.
                </p>
                <div class="detail-price">
                    <span class="price">$6</span>
                </div>
                <div class="detail-options">
                    <h3>Customize Your Sandwich</h3>
                    <label>
                        <input type="checkbox" id="extraCheese" onchange="updatePrice()">
                        Extra Cheese (+$2)
                    </label>
                    <label>
                        <input type="checkbox" id="bacon" onchange="updatePrice()">
                        Add Bacon (+$3)
                    </label>
                </div>
                <div class="quantity-selector">
                    <button onclick="decreaseQty()">-</button>
                    <span id="quantity">1</span>
                    <button onclick="increaseQty()">+</button>
                </div>
                <div class="total-price">
                    Total: $<span id="totalPrice">6</span>
                </div>
                <button class="btn add-to-order" onclick="addSandwichToOrder()">Add to Order</button>
            </div>
        </div>
    </section>

    <footer>
        <p>© 2026 Wonderfull Cafe | All Rights Reserved</p>
    </footer>

    <script src="script.js"></script>
    <script>
        let basePrice = 6;
        let quantity = 1;

        function updatePrice() {
            let total = basePrice;
            if (document.getElementById('extraCheese').checked) total += 2;
            if (document.getElementById('bacon').checked) total += 3;
            document.getElementById('totalPrice').textContent = total * quantity;
        }

        function increaseQty() {
            quantity++;
            document.getElementById('quantity').textContent = quantity;
            updatePrice();
        }

        function decreaseQty() {
            if (quantity > 1) {
                quantity--;
                document.getElementById('quantity').textContent = quantity;
                updatePrice();
            }
        }

        function addSandwichToOrder() {
            let total = basePrice;
            let itemName = 'Classic Sandwich';
            let customizations = [];

            if (document.getElementById('extraCheese').checked) {
                total += 2;
                customizations.push('Extra Cheese');
            }
            if (document.getElementById('bacon').checked) {
                total += 3;
                customizations.push('Bacon');
            }

            if (customizations.length > 0) {
                itemName = 'Classic Sandwich (' + customizations.join(', ') + ')';
            }

            for (let i = 0; i < quantity; i++) {
                addToOrder(itemName, total);
            }

            alert('Sandwich added to order!');
        }
    </script>
</body>

</html>
